name: sari-tebu-production
services:
    migrate:
        build:
            context: ../backend
            dockerfile: Dockerfile
        command: sh -c "npx prisma migrate deploy"
        env_file:
            - ../backend/.env.prod
        depends_on:
            database:
                condition: service_healthy
        restart: on-failure


    database:
        image: mysql:8.4
        container_name: sari-tebu-database
        restart: unless-stopped
        env_file:
            - ../backend/.env.prod
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 20s
            retries: 10
            start_period: 30s

    server:
        build:
            context: ../backend
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - ../backend/.env.prod
        expose:
            - "${PORT:-8080}"
        depends_on:
            migrate:
                condition: service_completed_successfully

    frontend:
        build:
            context: ../frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - ../frontend/.env.prod
        expose:
            - "${PORT:-5173}"
    
    caddy:
        image: caddy:alpine
        container_name: sari-tebu-reverse-proxy
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
        depends_on:
            - server
            - frontend

volumes:
    mysql_data: