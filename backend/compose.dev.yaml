name: sari-tebu-development
services:
    database:
        image: mysql:8.4
        container_name: mysql8.4
        restart: always
        env_file:
            - .env
        environment:
            MYSQL_DATABASE: ${DATABASE_NAME}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        ports:
            - "3306:3306"
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-p${MYSQL_ROOT_PASSWORD}",
                ]
            timeout: 20s
            retries: 10

    adminer:
        image: adminer
        container_name: adminer
        restart: always
        ports:
            - "9000:8080"
        depends_on:
            database:
                condition: service_healthy
